name: Server CI/CD

on:
  workflow_call:

jobs:
  shear:
    name: Lint that no unused imports are slowing the build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: {persist-credentials: false}
      - name: Install cargo-shear
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-shear
      
      - run: rustup default nightly-2026-01-15 && rustup update
      - run: cargo shear --expand
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: rustup update stable && rustup default stable
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: {persist-credentials: false}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            server
      - name: Setup | Setup Git to run feedback unit-tests
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - run: cargo test --no-run --locked
        env:
          CARGO_INCREMENTAL: 0
          CARGO_NET_RETRY: 10
          # See server/Dockerfile - disabling HTTP/2 multiplexing avoids the
          # framing-layer flake when cargo refreshes the registry.
          CARGO_HTTP_MULTIPLEXING: false
      - run: cargo test -- --nocapture --quiet
        env:
          CARGO_INCREMENTAL: 0
          CARGO_NET_RETRY: 10
          CARGO_HTTP_MULTIPLEXING: false
  linting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: rustup update stable && rustup default stable
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: {persist-credentials: false}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            server
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          CARGO_INCREMENTAL: 0
          CARGO_NET_RETRY: 10
          CARGO_HTTP_MULTIPLEXING: false
  build:
    uses: ./.github/workflows/_docker-build.yml
    with:
      image_suffix: server
      context: ./
      dockerfile: server/Dockerfile
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
