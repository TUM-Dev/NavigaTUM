name: Update data from upstream

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-dataupdate
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  schedule:
    - cron: "0 2 * * 2"
  workflow_dispatch:
permissions: {}

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: {persist-credentials: false}
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 11.3.0
          package_json_file: webclient/package.json
          run_install: |
            - cwd: webclient
              args: [--frozen-lockfile, --strict-peer-dependencies]
            - args: [--global, openapi-format]
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install python dependencies
        run: uv sync --frozen
      - run: rm *tumonline.csv
        working-directory: data/external/results/
      - name: Download tumonline data
        continue-on-error: true # a PR deleting all data will be created if this fails => fail obvious
        run: PYTHONPATH=$PYTHONPATH:.. uv run python scrapers/tumonline.py
        env:
          CONNECTUM_OAUTH_CLIENT_ID: "${{ secrets.CONECTUM_OAUTH_CLIENT_ID }}"
          CONNECTUM_OAUTH_CLIENT_SECRET: "${{ secrets.CONECTUM_OAUTH_CLIENT_SECRET }}"
        working-directory: data/external
      - name: Download Studentische Vertretung IRIS learning-room roster
        continue-on-error: true # an outage leaves the previous roster in place => coverage degrades, build still works
        run: PYTHONPATH=$PYTHONPATH:.. uv run python scrapers/iris.py
        working-directory: data/external
      - name: Download Studierendenwerk canteen opening hours
        continue-on-error: true # an outage leaves the previous hours in place => coverage degrades, build still works
        run: PYTHONPATH=$PYTHONPATH:.. uv run python scrapers/studierendenwerk.py
        working-directory: data/external
      - name: Download UB-TUM library opening hours
        continue-on-error: true # an outage leaves the previous hours in place => coverage degrades, build still works
        run: PYTHONPATH=$PYTHONPATH:.. uv run python scrapers/ub_tum.py
        working-directory: data/external
      - continue-on-error: true # a PR deleting all data will be created if this fails => fail obvious
        run: ls -lah data/external/results
      - continue-on-error: true # a PR deleting all data will be created if this fails => fail obvious
        run: du -sh data/external/results/*
      - name: Fix linting errors
        continue-on-error: true
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: data/external/results
          commit-message: Synced the data with upstream
          title: "chore(data): Synced the data with upstream datasources"
          body: |
            PR comes from [this Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Updated the data with upstream sources
            - Auto-generated by [create-pull-request][1]
            
            [ 1 ]: https://github.com/peter-evans/create-pull-request
          assignees: CommanderStorm
          branch: chore/data-update
          delete-branch: true
