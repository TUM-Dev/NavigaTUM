name: Martin CI/CD

on:
  workflow_call:

permissions: {}

jobs:
  validate-planetiler-custommap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: 
          persist-credentials: false
          sparse-checkout: |
            map
      - name: Setup | Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup | Install dependencies
        run: wget https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar
        working-directory: map/planetiler
      - name: Validate custom map
        run: java -Xmx1g -jar planetiler.jar verify shortbread_custom.yml
        working-directory: map/planetiler

  validate-planetiler-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            map
      - name: Setup | Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Setup | Install dependencies
        run: npm ci
        working-directory: map/planetiler
      - name: Setup | Download planetiler schemas
        # planetiler.schema.json $refs planetilerspec.schema.json, so both are needed to compile.
        run: |
          base=https://raw.githubusercontent.com/onthegomap/planetiler/main/planetiler-custommap
          wget -q "$base/planetiler.schema.json" "$base/planetilerspec.schema.json"
        working-directory: map/planetiler
      - name: Validate config against schema
        run: node --experimental-strip-types validate-schema.ts shortbread_custom.yml
        working-directory: map/planetiler

  validate-style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: 
          persist-credentials: false
          sparse-checkout: |
            map
      - name: Setup | Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Setup | Install dependencies
        run: npm ci
        working-directory: map/martin
      - name: Run style validation
        run: node --experimental-strip-types validate-style.ts styles/navigatum-basemap.json
        working-directory: map/martin

  render-e2e:
    # Ingest a small real geofabrik clip via osm2pgsql + planetiler, then assert martin serves an
    # indoor tile and the static basemap render. See map/martin/test/render-e2e.sh.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      db:
        image: postgis/postgis:18-3.6 # matches compose.yml
        env:
          POSTGRES_USER: navigatum
          POSTGRES_PASSWORD: navigatum
          POSTGRES_DB: navigatum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U navigatum"
          --health-interval 2s --health-timeout 5s --health-retries 15
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: navigatum
      PGPASSWORD: navigatum
      PGDATABASE: navigatum
      FIXTURE_PBF: ${{ github.workspace }}/fixture/garching.osm.pbf
      BBOX: "11.655,48.255,11.685,48.272"
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            map
            server/migrations
      - name: Setup | Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup | Install tools
        run: sudo apt-get update && sudo apt-get install --no-install-recommends --yes postgresql-client osmium-tool
      # Cache the clip so runs don't re-download the geofabrik extract. Bump the key to refresh
      # against newer OSM data or a changed BBOX (cache keys can't contain commas).
      - name: Setup | Cache fixture clip
        id: fixture-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fixture/garching.osm.pbf
          key: garching-clip-v1
      # The water-polygon shapefile is large and rarely changes; cache it so only the first run
      # downloads. Bump the key to refresh.
      - name: Setup | Cache planetiler sources
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: data/sources
          key: planetiler-sources-v1
      - name: Setup | Build fixture clip
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p fixture
          wget -q https://download.geofabrik.de/europe/germany/bayern/oberbayern-latest.osm.pbf -O fixture/oberbayern.osm.pbf
          osmium extract --bbox "$BBOX" --strategy complete_ways \
            fixture/oberbayern.osm.pbf -o "$FIXTURE_PBF"
          rm fixture/oberbayern.osm.pbf
      - name: Render end-to-end
        run: bash map/martin/test/render-e2e.sh

  build:
    uses: ./.github/workflows/_docker-build.yml
    with:
      image_suffix: martin
      context: ./map/martin
      dockerfile: Dockerfile
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
