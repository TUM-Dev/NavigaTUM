name: Create and publish a Docker image
# Keyed on image_suffix, not github.workflow: every caller now runs under the same
# orchestrator (ci.yaml), so a workflow-name-based group would make the server,
# webclient, and martin builds cancel one another.
concurrency:
  group: docker-${{ inputs.image_suffix }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  workflow_call:
    inputs:
      image_suffix:
        required: true
        description: Suffix of generated dockerimages' name
        type: string
      context:
        required: true
        description: Context, docker build is executed in
        type: string
      dockerfile:
        required: true
        description: Dockerfile location (relative to context)
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tum-dev/navigatum-${{ inputs.image_suffix }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Forked PRs do not have access to repo/org packages permissions and should not try to push.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Pre-pull buildkit image with retry
        # setup-buildx-action launches a docker-container builder that pulls
        # moby/buildkit:buildx-stable-1 from Docker Hub once, without retry.
        # When registry-1.docker.io rate-limits or times out, the whole build
        # fails before we ever invoke cargo. Pre-pulling with retry isolates
        # that transient failure mode from the actual build.
        run: |
          attempt=1
          until docker pull moby/buildkit:buildx-stable-1; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::docker pull moby/buildkit failed after $attempt attempts"
              exit 1
            fi
            echo "::warning::buildkit pull attempt $attempt failed, retrying in 15s"
            sleep 15
            attempt=$((attempt + 1))
          done
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          # Attestations only matter for images published from main.
          provenance: ${{ github.event_name == 'push' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name == 'push' }}
          context: ${{ inputs.context }} # zizmor: ignore[template-injection]
          push: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
          file: "${{ inputs.context }}/${{ inputs.dockerfile }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            GIT_COMMIT_MESSAGE="${github.event.head_commit.message//\n/}"
          # GHCR cache is shared across branches and free for public repos, unlike the 10GB Actions cache.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
      - name: Attest
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false # idk what is happening here with invalid image names, needs debugging
