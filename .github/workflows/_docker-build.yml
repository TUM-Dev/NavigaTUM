name: Create and publish a Docker image
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      image_suffix:
        required: true
        description: Suffix of generated dockerimages' name
        type: string
      context:
        required: true
        description: Context, docker build is executed in
        type: string
      dockerfile:
        required: true
        description: Dockerfile location (relative to context)
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/navigatum-${{ inputs.image_suffix }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Forked PRs do not have access to repo/org packages permissions and should not try to push.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          provenance: mode=max
          sbom: true
          context: ${{ inputs.context }} # zizmor: ignore[template-injection]
          push: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
          file: "${{ inputs.context }}/${{ inputs.dockerfile }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            GIT_COMMIT_MESSAGE="${github.event.head_commit.message//\n/}"
          cache-from: type=gha
          cache-to: type=gha,mode=min
      - name: Attest
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false # idk what is happening here with invalid image names, needs debugging
