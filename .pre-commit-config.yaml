repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-toml
      - id: check-yaml
        exclude: "(data/data_format_geo-entry.yaml)|(webclient/pnpm-lock.yaml)"
      - id: check-json
        exclude: "(webclient/tsconfig.json)"
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: ".*\\.rs"
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args:
          - --fix=lf
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.21
    hooks:
      - id: uv-lock
  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
        # scraped TUMonline CSVs contain smart quotes inside CSV-quoted fields;
        # naive ASCII replacement would corrupt the CSV escaping.
        exclude: "^data/external/results/.*\\.csv$"
      - id: fix-spaces
      - id: fix-ligatures
      - id: forbid-bidi-controls
  - repo: local
    hooks:
      - id: fix-unicode-dashes-single
        name: fold unicode dashes to single ASCII hyphen
        # texthooks' fix-unicode-dashes maps em-dash to "--"; we want single "-".
        # exclude self so the bracket pattern below is not eaten by its own hook.
        exclude: "^\\.pre-commit-config\\.yaml$"
        entry: sed -i 's/[‐‑‒–—―⁃−﹘﹣－]/-/g'
        language: system
        types: [text]
  # only server
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --manifest-path "server/Cargo.toml"
        language: rust
        pass_filenames: false
        files: ".*\\.rs"
  # only webclient
  - repo: local
    hooks:
      - id: webclient-format
        name: npm run format
        entry: npm run --prefix webclient format
        language: node
        pass_filenames: false
        files: (.*\\vue|.*\\m?js|.*\\ts|.*\\json)
  # only data
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
