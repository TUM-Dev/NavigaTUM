cache:
  size_mb: 1024
  tile_expiry: 1h
  tile_idle_timeout: 10m
listen_addresses: 0.0.0.0:3001
base_path: ${BASE_PATH:/}
web_ui: enableforall
sprites:
  - /map/sprites/maki
  - /map/sprites/navigatum
fonts:
  - /map/fonts
styles:
  paths:
  - /map/styles/navigatum-basemap.json
  rendering: true
mbtiles:
  paths:
    - /map/level_overlays
  sources:
    # named source matching source name to a single file
    shortbread: /data/output.mbtiles
postgres:
  connection_string: ${DATABASE_URL:postgres://postgres:CHANGE_ME@localhost:5432/postgres}
  auto_publish: false
  tables:
    events_active:
      schema: public
      table: events_active
      srid: 4326
      geometry_column: geometry
      geometry_type: POINT
      id_column: id
      minzoom: 10
      maxzoom: 22
      bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      properties:
        name: text
        description: text
        image: text
        image_author: text
        starts_at: timestamptz
        ends_at: timestamptz
        organising_org_id: int4
        organising_org_code: text
        organising_org_name_de: text
        organising_org_name_en: text
        # Epoch seconds for the /map time-window filter; the timestamptz columns render
        # as session-timezone text in tiles, which style expressions cannot compare.
        starts_at_epoch: int8
        ends_at_epoch: int8
    # /map "next 2 weeks" toggle; superset of events_active, same appears_at-free projection.
    events_upcoming:
      schema: public
      table: events_upcoming
      srid: 4326
      geometry_column: geometry
      geometry_type: POINT
      id_column: id
      minzoom: 10
      maxzoom: 22
      bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      properties:
        name: text
        description: text
        image: text
        image_author: text
        starts_at: timestamptz
        ends_at: timestamptz
        organising_org_id: int4
        organising_org_code: text
        organising_org_name_de: text
        organising_org_name_en: text
        # Epoch seconds for the /map time-window filter; the timestamptz columns render
        # as session-timezone text in tiles, which style expressions cannot compare.
        starts_at_epoch: int8
        ends_at_epoch: int8
  functions:
      indoor_rooms:
        schema: public
        function: indoor_rooms
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_doors:
        schema: public
        function: indoor_doors
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_walls:
        schema: public
        function: indoor_walls
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_pois:
        schema: public
        function: indoor_pois
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      card_validators:
        schema: public
        function: card_validators
        minzoom: 13
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
