cache:
  size_mb: 1024
  # Tile-cache TTL/TTI. The events_active view depends on `now()`, so cached
  # tiles must expire periodically — 1h matches the freshness window this
  # source is willing to surface a newly-active event in. Other tile sources
  # are static and rebuilt at the data-pipeline layer, so a 1h ceiling on
  # their cache lifetime is harmless.
  tile_expiry: 1h
  tile_idle_timeout: 10m
listen_addresses: 0.0.0.0:3001
base_path: ${BASE_PATH:/}
web_ui: enableforall
sprites:
  - /map/sprites/maki
  - /map/sprites/navigatum
fonts:
  - /map/fonts
styles:
  paths:
  - /map/styles/navigatum-basemap.json
  rendering: true
mbtiles:
  paths:
    - /map/level_overlays
  sources:
    # named source matching source name to a single file
    shortbread: /data/output.mbtiles
postgres:
  connection_string: ${DATABASE_URL:postgres://postgres:CHANGE_ME@localhost:5432/postgres}
  auto_publish: false
  # events_active is a now()-dependent view that filters events to the current
  # wall-clock window (starts_at - 2h * days_long .. ends_at). It inherits the
  # global tile_expiry / tile_idle_timeout above, which keeps tiles fresh on
  # the order of an hour without thundering on the DB for every request.
  tables:
    events_active:
      schema: public
      table: events_active
      srid: 4326
      geometry_column: geometry
      geometry_type: POINT
      id_column: id
      minzoom: 10
      maxzoom: 22
      bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      properties:
        name: text
        description: text
        image: text
        starts_at: timestamptz
        ends_at: timestamptz
        organising_org_id: int4
        organising_org_code: text
        organising_org_name_de: text
        organising_org_name_en: text
  functions:
      indoor_rooms:
        schema: public
        function: indoor_rooms
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_doors:
        schema: public
        function: indoor_doors
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_walls:
        schema: public
        function: indoor_walls
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_pois:
        schema: public
        function: indoor_pois
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
