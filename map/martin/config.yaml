cache_size_mb: 1024
listen_addresses: 0.0.0.0:3001
base_path: ${BASE_PATH:/}
web_ui: enableforall
sprites:
  - /map/sprites/maki
  - /map/sprites/navigatum
fonts:
  - /map/fonts
styles:
  paths:
  - /map/styles/navigatum-basemap.json
  rendering: true
mbtiles:
  paths:
    - /map/level_overlays
  sources:
    # named source matching source name to a single file
    shortbread: /data/output.mbtiles
postgres:
  connection_string: ${DATABASE_URL:postgres://postgres:CHANGE_ME@localhost:5432/postgres}
  auto_publish: false
  # events_active is a now()-dependent view: it filters to events visible in the
  # current wall-clock window (starts_at - 2h * days_long .. ends_at). Martin's
  # in-process LRU has no per-source TTL, so we keep tiles fresh via HTTP cache
  # headers (cache_ttl in seconds; 60s ≈ one frontend poll cycle, low enough
  # that a newly-active event appears within a minute, high enough to coalesce
  # bursty traffic). Pair this with a reverse-proxy `Cache-Control: max-age=60,
  # stale-while-revalidate=120` for the /tiles/events_active path.
  tables:
    events_active:
      schema: public
      table: events_active
      srid: 4326
      geometry_column: geometry
      id_column: id
      minzoom: 10
      maxzoom: 22
      bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      cache_ttl: 60
      properties:
        name: text
        description: text
        image: text
        starts_at: timestamptz
        ends_at: timestamptz
        organising_org_id: int4
        organising_org_code: text
        organising_org_name_de: text
        organising_org_name_en: text
  functions:
      indoor_rooms:
        schema: public
        function: indoor_rooms
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_doors:
        schema: public
        function: indoor_doors
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_walls:
        schema: public
        function: indoor_walls
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
      indoor_pois:
        schema: public
        function: indoor_pois
        minzoom: 16
        maxzoom: 30
        bounds: [ 5.98865807458, 47.3024876979, 15.0169958839, 54.983104153 ] # germany
