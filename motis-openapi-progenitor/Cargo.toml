[package]
name = "motis-openapi-progenitor"
version = "0.4.0"
edition = "2024"
license = "MIT or Apache-2.0"
description = "API-wrapper around the motis api used for routing"
documentation = "https://docs.rs/motis-openapi-progenitor"
repository = "https://github.com/tum-dev/navigatum"

[dependencies]
chrono = { workspace = true, default-features=false, features = ["serde"] }
progenitor-client.workspace = true
reqwest = { workspace = true, default-features=false, features = ["json", "stream"] }
serde = { workspace = true, features = ["derive"] }

[lints.rust]
unsafe_code = "forbid"

# This crate is fully generated by progenitor — silence style lints rather than
# patching machine-generated output that gets overwritten on regeneration.
[lints.clippy]
pedantic = { level = "allow", priority = -1 }
restriction = { level = "allow", priority = -1 }
