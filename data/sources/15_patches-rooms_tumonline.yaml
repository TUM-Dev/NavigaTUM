patches:
  # TODO Store old values before replacement, so they can also be found when searched for.
  #      (e.g. 2605.EG.149)
  # The following are known errors in the TUMonline arch_names (detected as duplicates)
  - {if_room_code: "4131\\.EG\\.005", arch_name: "EG05@4131", alt_name: "EG05, Treppe"}
  # There are inconsistencies with arch_name in building 0305: Some roomnames don't have a
  # usually prepended "S"
  - {if_room_code: "0305\\.01\\.512",  arch_name: "S1512@0305"}
  - {if_room_code: "0305\\.01\\.529A", arch_name: "S1529A@0305"}
  - {if_room_code: "0305\\.02\\.512",  arch_name: "S2512@0305"}
  - {if_room_code: "0305\\.02\\.529A", arch_name: "S2529A@0305"}
  - {if_room_code: "0305\\.03\\.512",  arch_name: "S3512@0305"}
  - {if_room_code: "0305\\.03\\.529A", arch_name: "S3529A@0305"}
  - {if_room_code: "0305\\.03\\.543",  arch_name: "S3543@0305"}
  # The "Theresianum Foyer, 0604" is an exception not formatted in the common alt_name format
  - {if_room_code: "0506\\.EG\\.604", alt_name: "Foyer"}
  # 
  - {if_room_code: "0206\\.DG\\.[0-3][0-9]{2}", __delete: true}
  # arch_name is accidentally in a different building
  - {if_room_code: "5606\\.03\\.055", arch_name: "03.06.055@5606"}

# Handling of arch_name duplicates
duplicates:
  ignore: []
  prepend_level: []

# User-submitted rooms that do not exist in TUMonline.
#
# These rows are merged into the rooms dict in `processors/tumonline.py:_clean_tumonline_rooms`
# before the drift-gate check runs, so a duplicate `room_key` here will fail the build the same
# way as a duplicate inside TUMonline itself.
#
# Schema (matches the `NewRoom` type in
# `server/src/routes/feedback/proposed_edits/addition/room.rs` 1:1, snake_case):
#
#   - room_key: "5117.EG.103"           # 3 dot-segments; alphanumeric/dot/dash
#     parent_building_id: "5117"        # must equal the first segment of room_key
#     alt_name: "Display name"
#     arch_name: "EG103@5117"           # NAME@BUILDING, BUILDING is 4 digits
#     usage_id: 12                      # must reference an entry in usages_tumonline.csv
#     # Optional structured fields:
#     seats: { sitting: 30, standing: 0, wheelchair: 0 }
#     floor_type: "Linoleum"
#     floor_level: "1.OG"
#     address: { place: "Munich", street: "Theresienstr. 90", zip_code: "80333" }
#     coords: { lat: 48.262, lon: 11.668 }
#
# Most additions land here via the feedback backend (POST /api/feedback/propose_edits with the
# `additions` field). Manually appending here is also fine; validation is mirrored in Python.
additions: []
