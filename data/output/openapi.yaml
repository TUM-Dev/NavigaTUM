openapi: 3.1.0
info:
  title: NavigaTUM
  description: |-
    Navigating around TUM with excellence - An API to search for rooms,
    buildings and other places

    NavigaTUM is a tool developed by students for students, to help you get around at [TUM](https://tum.de). Feel free to contribute.

    - [x] Interactive/static maps to look up the position of rooms or buildings
    - [x] Fast and typo-tolerant search
    - [x] Support for different room code formats as well as generic names
    - [x] All functionality is also available via an open and well documented API
    - [x] Automatically update the data from upstream datasources
    - [x] Allow students/staff to easily submit feedback and data patches
    - [x] Generate turn by turn navigation advice for navigating end to end
    - [ ] Generate maps from CAD data sources

    If you'd like to help out or join us in this adventure, we would love to talk to you.
  termsOfService: https://nav.tum.de/en/about/privacy
  contact:
    name: OpenSource @ TUM e.V.
    url: https://tum.dev/
    email: navigatum@tum.de
  license:
    name: GPL v3
    url: https://www.gnu.org/licenses/
  version: 0.0.0
  x-logo:
    altText: null
    backgroundColor: null
    href: https://nav.tum.de
    url: https://raw.githubusercontent.com/TUM-Dev/NavigaTUM/refs/heads/main/webclient/app/assets/logos/navigatum.svg
servers:
  - url: https://nav.tum.de
    description: production
paths:
  /api/calendar:
    post:
      tags:
        - calendar
      summary: Retrieve Calendar Entries
      description: |-
        Retrieves calendar entries for specific `ids` within the requested time span.
        The time span is defined by the `start_after` and `end_before` query parameters.
        Ensure to provide valid date-time formats for these parameters.

        If successful, returns additional entries in the requested time span.
      operationId: calendar_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Arguments'
        required: true
      responses:
        "200":
          description: '**Entries of the calendar** in the requested time span'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/LocationEventsResponse'
                propertyNames:
                  type: string
        "400":
          description: '**Bad Request.** Not all fields in the body are present as defined above'
          content:
            text/plain:
              schema:
                type: string
              example: Too many ids to query. We suspect that users don't need this. If you need this limit increased, please send us a message
        "404":
          description: '**Not found.** The requested location does not have a calendar'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
        "503":
          description: '**Not Ready.** please retry later'
          content:
            text/plain:
              schema:
                type: string
              example: Waiting for first sync with TUMonline
  /api/feedback/feedback:
    post:
      tags:
        - feedback
      summary: Post feedback
      description: |-
        ***Do not abuse this endpoint.***

        This posts the actual feedback to GitHub and returns the GitHub link.
        This API will create issues instead of pull-requests
        => all feedback is allowed, but [`/api/feedback/propose_edits`](#tag/feedback/operation/propose_edits) is preferred, if it can be posted there.

        For this Endpoint to work, you need to generate a token via the [`/api/feedback/get_token`](#tag/feedback/operation/get_token) endpoint.

        # Note

        Tokens are only used if we return a 201 Created response.
        Otherwise, they are still valid
      operationId: send_feedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostFeedbackRequest'
        required: true
      responses:
        "201":
          description: The feedback has been **successfully posted to GitHub**. We return the link to the GitHub issue.
          content:
            text/plain:
              schema:
                type: string
                format: uri
              example: https://github.com/TUM-Dev/navigatum/issues/9
        "400":
          description: '**Bad Request.** Not all fields in the body are present as defined above'
        "403":
          description: |-
            **Forbidden.** Causes are (delivered via the body):

            - `Invalid token`: You have not supplied a token generated via the `gen_token`-Endpoint.
            - `Token not old enough, please wait`: Tokens are only valid after 10s.
            - `Token expired`: Tokens are only valid for 12h.
            - `Token already used`: Tokens are non reusable/refreshable single-use items.
          content:
            text/plain:
              schema:
                type: string
        "422":
          description: '**Unprocessable Entity.** Subject or body missing or too short.'
        "451":
          description: '**Unavailable for legal reasons.** Using this endpoint without accepting the privacy policy is not allowed. For us to post to GitHub, this has to be `true`'
        "500":
          description: '**Internal Server Error.** We have a problem communicating with GitHubs servers. Please try again later'
        "503":
          description: '**Service unavailable.** We have not configured a GitHub Access Token. This could be because we are experiencing technical difficulties or intentional. Please try again later.'
  /api/feedback/get_token:
    post:
      tags:
        - feedback
      summary: Get a feedback-token
      description: |-
        ***Do not abuse this endpoint.***

        This returns a JWT token usable for submitting feedback.
        You should request a token, ***if (and only if) a user is on a feedback page***

        As a rudimentary way of rate-limiting feedback, this endpoint returns a token.
        To post feedback, you will need this token.

        Tokens gain validity after 5s, and are invalid after 12h of being issued.
        They are not refreshable, and are only valid for one usage.

        # Note:

        Global Rate-Limiting allows bursts with up to 20 requests and replenishes 50 requests per day
      operationId: get_token
      responses:
        "201":
          description: '**Created** a usable token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "429":
          description: '**Too many requests.** We are rate-limiting everyone''s requests, please try again later.'
        "503":
          description: '**Service unavailable.** We have not configured a GitHub Access Token. This could be because we are experiencing technical difficulties or intentional. Please try again later.'
  /api/feedback/propose_edits:
    post:
      tags:
        - feedback
      summary: Post Edit-Requests
      description: |-
        ***Do not abuse this endpoint.***

        This posts the actual feedback to GitHub and returns the github link.
        This API will create pull-requests instead of issues => only a subset of feedback is allowed.
        For this Endpoint to work, you need to generate a token via the [`/api/feedback/get_token`](#tag/feedback/operation/get_token) endpoint.

        # Note:

        Tokens are only used if we return a 201 Created response. Otherwise, they are still valid
      operationId: propose_edits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditRequest'
        required: true
      responses:
        "201":
          description: The edit request feedback has been **successfully posted to GitHub**. We return the link to the GitHub issue.
          content:
            text/plain:
              schema:
                type: string
                format: uri
              example: https://github.com/TUM-Dev/navigatum/issues/9
        "400":
          description: '**Bad Request.** Not all fields in the body are present as defined above'
        "403":
          description: |-
            **Forbidden.** Causes are (delivered via the body):

            - `Invalid token`: You have not supplied a token generated via the `gen_token`-Endpoint.
            - `Token not old enough, please wait`: Tokens are only valid after 10s.
            - `Token expired`: Tokens are only valid for 12h.
            - `Token already used`: Tokens are non reusable/refreshable single-use items.
        "422":
          description: '**Unprocessable Entity.** Subject or body missing or too short.'
        "451":
          description: '**Unavailable for legal reasons.** Using this endpoint without accepting the privacy policy is not allowed. For us to post to GitHub, this has to be true'
        "500":
          description: '**Internal Server Error.** We have a problem communicating with GitHubs servers. Please try again later.'
        "503":
          description: Service unavailable. We have not configured a GitHub Access Token. This could be because we are experiencing technical difficulties or intentional. Please try again later.
  /api/locations/{id}:
    get:
      tags:
        - locations
      summary: Get entry-details
      description: |-
        This returns the full data available for the entry (room/building).

        This is more data, that should be supplied once a user clicks on an entry.
        Preloading this is not an issue on our end, but keep in mind bandwith constraints on your side.
        The data can be up to 50kB (using gzip) or 200kB unzipped.
        More about this data format is described in the NavigaTUM-data documentation
      operationId: get_handler
      parameters:
        - name: id
          in: path
          description: ID of the location
          required: true
          schema:
            type: string
        - name: lang
          in: query
          description: The language you want your preview to be in. If either this or the query parameter is set to en, this will be delivered.
          required: false
          schema:
            type: string
            enum:
              - de
              - en
      responses:
        "200":
          description: '**Details** about the **location**'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDetailsResponse'
        "400":
          description: '**Bad request.** Make sure that requested item ID is not empty and not longer than 255 characters'
          content:
            text/plain:
              schema:
                type: string
              example: Invalid ID
        "404":
          description: '**Not found.** Make sure that requested item exists'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
  /api/locations/{id}/nearby:
    get:
      tags:
        - locations
      summary: Get the nearby items
      description: Shows nearby POIs like public transport stations
      operationId: nearby_handler
      parameters:
        - name: id
          in: path
          description: ID of a location
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Things **nearby to the location**
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyLocationsResponse'
        "400":
          description: '**Bad request.** Make sure that requested item ID is not empty and not longer than 255 characters'
          content:
            text/plain:
              schema:
                type: string
              example: Invalid ID
        "404":
          description: '**Not found.** Make sure that requested item exists'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
  /api/locations/{id}/preview:
    get:
      tags:
        - locations
      summary: Get a entry-preview
      description: |-
        This returns a 1200x630px preview for the location (room/building/..).

        This is usefully for implementing custom `OpenGraph` images for detail previews.
      operationId: maps_handler
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum:
              - de
              - en
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - open_graph
              - square
      responses:
        "200":
          description: '**Preview image**'
          content:
            image/png: {}
        "400":
          description: '**Bad request.** Make sure that requested item ID is not empty and not longer than 255 characters'
          content:
            text/plain:
              schema:
                type: string
              example: Invalid ID
        "404":
          description: '**Not found.** Make sure that requested item exists'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
  /api/locations/{id}/qr-code:
    get:
      tags:
        - locations
      summary: Get a QR code for a location
      description: |-
        This returns a QR code image (PNG) that links to the location's detail page.
        The QR code uses TUM blue (#0065bd) as foreground color with white background and rounded corners.
      operationId: qr_code_handler
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: '**QR code image**'
          content:
            image/png: {}
        "400":
          description: '**Bad request.** Make sure that requested item ID is not empty and not longer than 255 characters'
          content:
            text/plain:
              schema:
                type: string
              example: Invalid ID
        "500":
          description: '**Internal server error**'
          content:
            text/plain:
              schema:
                type: string
  /api/maps/route:
    get:
      tags:
        - maps
      summary: Routing requests
      description: |-
        **API IS EXPERIMENTAL AND ACTIVELY SUBJECT TO CHANGE**

        The user specifies using provided origin (`from`) and destination (`to`) locations and a transport mode (`route_costing`) to tune their routing between the two locations.
        The costing is fine-tuned by the server side accordingly.

        Internally, this endpoint relies on
        - [Valhalla](https://github.com/valhalla/valhalla) for routing for route calculation
        - our database to resolve ids.

          You will need to look the ids up via [`/api/search`](#tag/locations/operation/search_handler) beforehand.
          **Note:** [`/api/search`](#tag/locations/operation/search_handler) does support both university internal routing and external addressing.

        **In the future (i.e. public transit routing currently is not implemented)**, it will als rely on either
        - [OpenTripPlanner2](https://www.opentripplanner.org/) or
        - [Motis](https://github.com/motis-project/motis)
      operationId: route_handler
      parameters:
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum:
              - de
              - en
        - name: from
          in: query
          description: Start of the route
          required: true
          schema:
            oneOf:
              - $ref: '#/components/schemas/Coordinate'
                description: |-
                  Either an
                  - external address which was looked up or
                  - the users current location
              - type: string
                description: Our (uni internal) key for location identification
        - name: to
          in: query
          description: Destination of the route
          required: true
          schema:
            oneOf:
              - $ref: '#/components/schemas/Coordinate'
                description: |-
                  Either an
                  - external address which was looked up or
                  - the users current location
              - type: string
                description: Our (uni internal) key for location identification
        - name: route_costing
          in: query
          description: |-
            Transport mode the user wants to use

            If not specified, the default is based on how far the destinations are apart and requested time.
          required: false
          schema:
            oneOf:
              - type: "null"
              - type: string
                description: Transport mode the user wants to use
                enum:
                  - pedestrian
                  - bicycle
                  - motorcycle
                  - car
                  - public_transit
        - name: pedestrian_type
          in: query
          description: Does the user have specific walking restrictions?
          required: false
          schema:
            type: string
            description: Does the user have specific walking needs?
            enum:
              - standard
              - blind
              - wheelchair
        - name: ptw_type
          in: query
          description: Does the user prefer mopeds or motorcycles for powered two-wheeled (ptw)?
          required: false
          schema:
            type: string
            description: Does the user have a moped or motorcycle
            enum:
              - motorcycle
              - moped
        - name: bicycle_type
          in: query
          description: Which kind of bicycle do you ride?
          required: false
          schema:
            type: string
            description: Which kind of bicycle do you ride?
            enum:
              - road
              - hybrid
              - cross
              - mountain
        - name: page_cursor
          in: query
          description: |-
            Cursor position for pagination
            Only avaliable for some costings
          required: false
          schema:
            type:
              - string
              - "null"
        - name: time
          in: query
          description: |-
            Time for the route (ISO 8601 format)
            Used with `arrive_by` to determine if this is departure or arrival time
          required: false
          schema:
            type:
              - string
              - "null"
            format: date-time
        - name: arrive_by
          in: query
          description: Whether the time parameter represents arrival time (true) or departure time (false/not set)
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: '**Routing solution**'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingResponse'
        "404":
          description: '**Not found.** The requested location does not exist'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
  /api/mensa/{canteen}:
    get:
      tags:
        - mensa
      summary: Get a canteen's live menu
      description: |-
        Proxies the TUM-Dev eat-api feed for the current and next ISO week at request time, so the
        menu stays fresh without a rebuild. The German dish `labels` are mapped to localized text by
        the client.

        An unknown or closed canteen returns `200` with an empty `days` list; only an actual upstream
        outage returns `502`, letting callers tell "closed" from "broken".
      operationId: menu_handler
      parameters:
        - name: canteen
          in: path
          description: eat-api canteen slug.
          required: true
          schema:
            type: string
          example: mensa-garching
      responses:
        "200":
          description: '**Menu** for the **canteen**, current and next ISO week merged'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensaMenuResponse'
        "404":
          description: '**Bad slug.** The canteen id must match `^[a-z0-9-]{1,40}$`'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
        "502":
          description: '**Upstream failure.** eat-api could not be reached or returned an error'
          content:
            text/plain:
              schema:
                type: string
              example: eat-api upstream unavailable
  /api/openapi.json:
    get:
      summary: Openapi service definition
      description: Usefull for consuming in external openapi tooling
      operationId: openapi_doc
      responses:
        "200":
          description: The openapi definition
          content:
            application/json: {}
  /api/search:
    get:
      tags:
        - locations
      summary: Search entries
      description: |-
        This endpoint is designed to support search-as-you-type results.

        Instead of simply returning a list, the search results are returned in a way to provide a richer experience by splitting them up into sections. You might not necessarily need to implement all types of sections, or all sections features (if you just want to show a list). The order of sections is a suggested order to display them, but you may change this as you like.

        Some fields support highlighting the query terms and it uses \x19 and \x17 to mark the beginning/end of a highlighted sequence.
        (See [Wikipedia](https://en.wikipedia.org/wiki/C0_and_C1_control_codes#Modified_C0_control_code_sets)).
        Some text-renderers will ignore them, but in case you do not want to use them, you might want to remove them from the responses via empty `pre_highlight` and `post_highlight` query parameters.
      operationId: search_handler
      parameters:
        - name: q
          in: query
          description: |-
            string you want to search for.

            The amounts returned can be controlled using the `limit_*` parameters.
            Use `in`, `usage`, `type`, and `near` query parameters for filtering.
          required: true
          schema:
            type: string
        - name: in
          in: query
          description: |-
            Filter by parent (building, campus, etc.).

            Can be repeated for multiple values (e.g. `&in=garching&in=5304`).
          required: false
          schema:
            type: array
            items:
              type: string
        - name: usage
          in: query
          description: |-
            Filter by usage type (e.g. `wc`, `büro`).

            Can be repeated for multiple values.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: type
          in: query
          description: |-
            Filter by facet.

            Can be repeated for multiple values. Unknown values cause a `400`.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FacetFilter'
        - name: near
          in: query
          description: Sort results by distance to a coordinate (`lat,lon`).
          required: false
          schema:
            type: string
        - name: search_addresses
          in: query
          description: |-
            Include adresses in the saerch

            Be aware that Nominatim (which we use to do this search) is really slow (~100ms).
            Only activate this when you really need it.
          required: false
          schema:
            type: boolean
        - name: search_events
          in: query
          description: |-
            Include campus events in the search.

            Most clients don't render events, so this facet is disabled by default.
            Requesting `type=event` implies enabling it.
          required: false
          schema:
            type: boolean
        - name: limit_sites
          in: query
          description: |-
            Maximum number of sites (campus / site / area) to return.

            Clamped to `0`..`1000`.
            If this is a problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit_buildings
          in: query
          description: |-
            Maximum number of buildings to return.

            Clamped to `0`..`1000`.
            If this is a problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit_rooms
          in: query
          description: |-
            Maximum number of rooms to return.

            Clamped to `0`..`1000`.
            If this is an problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit_pois
          in: query
          description: |-
            Maximum number of POIs (points of interest) to return.

            Clamped to `0`..`1000`.
            If this is a problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit_lectures
          in: query
          description: |-
            Maximum number of lectures to return.

            Clamped to `0`..`1000`.
            If this is a problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit_events
          in: query
          description: |-
            Maximum number of events to return.

            Only has an effect when the event facet is enabled (via `search_events`
            or `type=event`).
            Clamped to `0`..`1000`.
            If this is a problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit_all
          in: query
          description: |-
            Maximum number of results to return.

            Clamped to `1`..`1000`.
            If this is an problem for you, please open an issue.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: pre_highlight
          in: query
          description: |-
            string to include in front of highlighted sequences.

            If this and `post_highlight` are empty, highlighting is disabled.
            For background on the default values, please see [Wikipedia](https://en.wikipedia.org/wiki/C0_and_C1_control_codes#Modified_C0_control_code_sets)).
          required: false
          schema:
            type: string
        - name: post_highlight
          in: query
          description: |-
            string to include after the highlighted sequences.

            If this and `pre_highlight` are empty, highlighting is disabled.
            For background on the default values, please see [Wikipedia](https://en.wikipedia.org/wiki/C0_and_C1_control_codes#Modified_C0_control_code_sets)).
          required: false
          schema:
            type: string
        - name: cropping
          in: query
          description: |-
            How to handle cropping of long building names in `parsed_id`.

            - `crop` (default): crop long names (> 25 chars) with an ellipsis.
            - `full`: never crop; always show full building names.
          required: false
          schema:
            type: string
            description: Controls whether long building names inside `parsed_id` are cropped.
            enum:
              - crop
              - full
        - name: parsed_id
          in: query
          description: |-
            How to format `parsed_id` for rooms.

            - `prefixed` (default): add common building prefixes (e.g. `MW 1801`).
            - `roomfinder`: return room codes in Roomfinder format (`archname@building_id`).
          required: false
          schema:
            type: string
            description: Controls how `parsed_id` is built for room results.
            enum:
              - prefixed
              - roomfinder
      responses:
        "200":
          description: Search entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        "400":
          description: '**Bad Request.** Not all fields in the body are present as defined above'
          content:
            text/plain:
              schema:
                type: string
              example: 'Query deserialize error: invalid digit found in string'
        "404":
          description: '**Not found.** `q` is empty. Since searching for nothing is nonsensical, we dont support this.'
          content:
            text/plain:
              schema:
                type: string
              example: Not found
        "414":
          description: '**URI Too Long.** The uri you are trying to request is unreasonably long. Search querys dont have thousands of chars..'
          content:
            text/plain:
              schema:
                type: string
  /api/status:
    get:
      summary: API healthcheck
      description: |-
        If this endpoint does not return 200, the API is experiencing a catastrophic outage.
        **Should never happen.**
      operationId: health_status_handler
      responses:
        "200":
          description: API is **healthy**
          content:
            text/plain:
              schema:
                type: string
              example: |-
                healthy
                source_code: https://github.com/TUM-Dev/navigatum/tree/{hash}
        "503":
          description: API is **NOT healthy**
          content:
            text/plain:
              schema:
                type: string
              example: |-
                unhealthy
                source_code: https://github.com/TUM-Dev/navigatum/tree/{hash}
components:
  schemas:
    AddressEntry:
      type: object
      description: |-
        A Nominatim address search result.

        Unlike a [`LocationEntry`], an address is not a `NavigaTUM` entity: it has no
        canonical `/{type}/{id}` route, and its `addresstype` is an open Nominatim
        vocabulary rather than the closed [`LocationEntryType`] set.
      required:
        - id
        - addresstype
        - name
        - subtext
      properties:
        addresstype:
          type: string
          description: The raw Nominatim `addresstype` (e.g. `road` or `suburb`).
          example: road
        id:
          type: string
          description: The id of the address, derived from the OSM id.
          example: osm_182663548
        name:
          type: string
          description: The display name of the result.
          example: Boltzmannstraße
        subtext:
          type: string
          description: |-
            Subtext to show below the search result.

            Contains the serialised address.
          example: Boltzmannstraße, Garching bei München
    AddressSection:
      type: object
      description: A section of Nominatim address results.
      required:
        - entries
        - n_visible
        - estimatedTotalHits
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AddressEntry'
        estimatedTotalHits:
          type: integer
          description: The estimated (not exact) number of hits for that query
          example: 6
          minimum: 0
        n_visible:
          type: integer
          description: |-
            A recommendation how many of the entries should be displayed by default.

            The number is usually from `0`..`5`.
            More results might be displayed when clicking "expand".
          example: 4
          minimum: 0
    AlertCauseResponse:
      type: string
      enum:
        - unknown_cause
        - other_cause
        - technical_problem
        - strike
        - demonstration
        - accident
        - holiday
        - weather
        - maintenance
        - construction
        - police_activity
        - medical_emergency
    AlertEffectResponse:
      type: string
      enum:
        - no_service
        - reduced_service
        - significant_delays
        - detour
        - additional_service
        - modified_service
        - other_effect
        - unknown_effect
        - stop_moved
        - no_effect
        - accessibility_issue
    AlertResponse:
      type: object
      required:
        - description_text
        - header_text
      properties:
        cause:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/AlertCauseResponse'
        cause_detail:
          type:
            - string
            - "null"
          description: |-
            Description of the cause of the alert that allows for
             agency-specific language; more specific than the Cause.
        description_text:
          type: string
          description: |-
            Description for the alert.
            This plain-text string will be formatted as the body of the alert
             (or shown on an explicit "expand" request by the user).
             The information in the description should add to the information of
             the header.
        effect:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/AlertEffectResponse'
        effect_detail:
          type:
            - string
            - "null"
          description: |-
            Description of the effect of the alert that allows for
             agency-specific language; more specific than the Effect.
        header_text:
          type: string
          description: |-
            Header for the alert. This plain-text string will be highlighted,
             for example in boldface.
        image_alternative_text:
          type:
            - string
            - "null"
          description: |-
            Text describing the appearance of the linked image in the image
             field (e.g., in case the image can't be displayed or the
             user can't see the image for accessibility reasons). See the
             HTML spec for alt image text.
        image_media_type:
          type:
            - string
            - "null"
          description: |-
            IANA media type as to specify the type of image to be displayed. The
             type must start with "image/"
        image_url:
          type:
            - string
            - "null"
          description: String containing an URL linking to an image.
        severity_level:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/AlertSeverityLevelResponse'
        url:
          type:
            - string
            - "null"
          description: The URL which provides additional information about the alert.
    AlertSeverityLevelResponse:
      type: string
      enum:
        - unknown
        - info
        - warning
        - severe
    Arguments:
      type: object
      required:
        - ids
        - start_after
        - end_before
      properties:
        end_before:
          type: string
          format: date-time
          description: The last allowed time the calendar would like to display
          examples:
            - "2039-01-19T03:14:07+01:00"
            - 2042-01-07T00:00:00 UTC
        ids:
          type: array
          items:
            type: string
          description: |-
            ids you want the calendars for

            Limit of max. 10 ids is arbitraryly chosen, if you need this limit increased, please contact us
          example:
            - 5605.EG.011
            - 5510.02.001
            - 5606.EG.036
            - "5304"
          maxItems: 10
          minItems: 1
        start_after:
          type: string
          format: date-time
          description: The first allowed time the calendar would like to display
          examples:
            - "2039-01-19T03:14:07+01:00"
            - 2042-01-07T00:00:00 UTC
    BuildingKind:
      type: string
      enum:
        - building
        - joined_building
        - area
    BuildingsOverviewItemResponse:
      type: object
      required:
        - id
        - type
        - name
        - subtext
      properties:
        id:
          type: string
          description: The id of the entry
        name:
          type: string
          description: Human display name
        subtext:
          type: string
          description: What should be displayed below this Building
        thumb:
          type:
            - string
            - "null"
          description: The thumbnail for the building
        type:
          $ref: '#/components/schemas/BuildingsOverviewItemTypeResponse'
          description: The type of the entry, used to build its canonical `/{type}/{id}` route.
    BuildingsOverviewItemTypeResponse:
      type: string
      description: |-
        The type of a building-overview child.

        A strict subset of [`LocationTypeResponse`]: the overview only ever lists the
        container types whose `subtext` the data pipeline knows how to render
        (`generate_buildings_overview` in `data/processors/sections.py`). Modelling it
        separately lets clients build the canonical `/{type}/{id}` route without a
        non-routable fallback.
      enum:
        - building
        - joined_building
        - area
        - site
    BuildingsOverviewResponse:
      type: object
      required:
        - entries
        - n_visible
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/BuildingsOverviewItemResponse'
        n_visible:
          type: integer
          format: int32
          minimum: 0
    CalendarLocationResponse:
      type: object
      required:
        - key
        - name
        - last_calendar_scrape_at
        - type_common_name
        - type
      properties:
        calendar_url:
          type:
            - string
            - "null"
          description: Link to the calendar of the room
          examples:
            - https://campus.tum.de/tumonline/tvKalender.wSicht?cOrg=19691&cRes=12543&cReadonly=J
            - https://campus.tum.de/tumonline/tvKalender.wSicht?cOrg=19691&cRes=12559&cReadonly=J
        key:
          type: string
          description: |-
            Structured, globaly unique room code

            Included to enable multi-room calendars.
            Format: BUILDING.LEVEL.NUMBER
          examples:
            - 5602.EG.001
            - 5121.EG.003
        last_calendar_scrape_at:
          type: string
          format: date-time
          description: last time the calendar was scraped for this room
          examples:
            - "2039-01-19T03:14:07+01:00"
            - 2042-01-07T00:00:00 UTC
        name:
          type: string
          description: name of the entry in a human-readable form
          examples:
            - 5602.EG.001 (MI HS 1, Friedrich L. Bauer Hörsaal)
            - 5121.EG.003 (Computerraum)
        type:
          type: string
          description: |-
            type of the entry

            TODO document as a n enum with the following choices:
            - `room`
            - `building`
            - `joined_building`
            - `area`
            - `site`
            - `campus`
            - `poi`
          examples:
            - room
            - building
            - joined_building
            - area
            - site
            - campus
            - poi
        type_common_name:
          type: string
          description: Type of the entry in a human-readable form
          examples:
            - Serverraum
            - Büro
    ComputedPropResponse:
      type: object
      required:
        - name
        - text
      properties:
        extra:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/ExtraComputedPropResponse'
        name:
          type: string
          examples:
            - Raumkennung
        text:
          type: string
          examples:
            - 5602.EG.001
    Coordinate:
      type: object
      required:
        - lat
        - lon
      properties:
        lat:
          type: number
          format: double
          description: Latitude
          example: 48.26244490906312
        lon:
          type: number
          format: double
          description: Longitude
          example: 48.26244490906312
    CoordinateAccuracyResponse:
      type: string
      enum:
        - building
    CoordinateResponse:
      type: object
      required:
        - lat
        - lon
        - source
      properties:
        accuracy:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/CoordinateAccuracyResponse'
              description: |-
                How accurate the coordinate is.
                Only present, if it is limited to a degree (e.g. we only know the building)
        lat:
          type: number
          format: double
          description: Latitude
          example: 48.26244490906312
        lon:
          type: number
          format: double
          description: Longitude
          example: 48.26244490906312
        source:
          $ref: '#/components/schemas/CoordinateSourceResponse'
          description: Source of the Coordinates
    CoordinateSourceResponse:
      type: string
      enum:
        - navigatum
        - roomfinder
        - inferred
    DefaultMapsResponse:
      type: string
      enum:
        - interactive
        - roomfinder
    DirectionResponse:
      type: string
      enum:
        - depart
        - hard_left
        - left
        - slightly_left
        - continue
        - slightly_right
        - right
        - hard_right
        - circle_clockwise
        - circle_counterclockwise
        - stairs
        - elevator
        - uturn_left
        - uturn_right
    EditRequest:
      type: object
      required:
        - token
        - additional_context
        - privacy_checked
      properties:
        additional_context:
          type: string
          description: |-
            Additional context for the edit.

            Will be displayed in the discription field of the PR
          example: I have a picture of the room, please add it to the roomfinder
        additions:
          $ref: '#/components/schemas/LimitedHashMap_String_Addition'
          description: New rooms/buildings/POIs to add. Keyed by the new entry's ID. Validated server-side.
        edits:
          $ref: '#/components/schemas/LimitedHashMap_String_Edit'
          description: The edits to be made to the room. The keys are the ID of the props to be edited, the values are the proposed Edits.
        privacy_checked:
          type: boolean
          description: |-
            Whether the user has checked the privacy-checkbox.

            We are posting the feedback publicly on GitHub (not a EU-Company).
            **You MUST also include such a checkmark.**
        token:
          type: string
          description: The JWT token, that can be used to generate feedback
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJleHAiOjE2Njk2MzczODEsImlhdCI6MTY2OTU5NDE4MSwibmJmIjoxNjY5NTk0MTkxLCJraWQiOjE1ODU0MTUyODk5MzI0MjU0Mzg2fQ.sN0WwXzsGhjOVaqWPe-Fl5x-gwZvh28MMUM-74MoNj4
    EventEntry:
      type: object
      description: |-
        A campus event search result, carrying the full event-proposal pre-fill payload.

        One entry per `events.csv` row, identified by the addition key: picking one
        in a client pre-fills the event proposal form without a second round-trip,
        so every CSV column rides along.
      required:
        - id
        - name
        - description
        - starts_at
        - ends_at
        - lat
        - lon
        - organising_org_id
        - image
        - image_author
        - image_thumb_offset
        - image_header_offset
      properties:
        description:
          type: string
          description: The description of the event.
          example: Open-air student festival.
        ends_at:
          type: string
          format: date-time
          description: When the event ends, as an RFC 3339 timestamp.
          example: "2026-06-19T21:59:00Z"
        id:
          type: string
          description: |-
            The `event_<hash>` addition key - the upsert identity shared by the
            `events.csv` row and its key-named images.
          example: event_9d02ddd940c43f87
        image:
          type: string
          description: The `/cdn/thumb/…` delivery path of the event image.
          example: /cdn/thumb/event_9d02ddd940c43f87_0.webp
        image_author:
          type: string
          description: The author of the event image (CC-BY attribution).
          example: Studentische Vertretung TUM
        image_header_offset:
          type: integer
          format: int32
          description: |-
            Crop offset of the header image: pixels to shift the crop window
            along the image's longer axis. `0` when unset, so a client can recover the crop.
          example: 257
        image_thumb_offset:
          type: integer
          format: int32
          description: |-
            Crop offset of the thumbnail image: pixels to shift the crop window
            along the image's longer axis. `0` when unset, so a client can recover the crop.
          example: 14
        lat:
          type: number
          format: double
          description: Latitude of the event location.
          example: 48.262908
        lon:
          type: number
          format: double
          description: Longitude of the event location.
          example: 11.669102
        name:
          type: string
          description: The display name of the result. Supports highlighting.
          example: "\x19GARNIX\x17 Festival"
        organising_org_id:
          type: integer
          format: int32
          description: The `TUMonline` org id of the organising organisation.
          example: 51897
        starts_at:
          type: string
          format: date-time
          description: When the event starts, as an RFC 3339 timestamp.
          example: "2026-06-15T14:00:00Z"
    EventResponse:
      type: object
      required:
        - id
        - room_code
        - start_at
        - end_at
        - title_de
        - title_en
        - entry_type
        - detailed_entry_type
      properties:
        detailed_entry_type:
          type: string
          description: For some Entrys, we do have more information (what kind of a `lecture` is it? What kind of an other `entry` is it?)
          examples:
            - Abhaltung
        end_at:
          type: string
          format: date-time
          description: end of the entry
          examples:
            - 2019-01-01T00:00:00
        entry_type:
          $ref: '#/components/schemas/EventTypeResponse'
          description: |-
            What this calendar entry means.

            Each of these should be displayed in a different color
        id:
          type: integer
          format: int32
          description: ID of the calendar entry used in `TUMonline` internally
          examples:
            - 6424
        room_code:
          type: string
          description: |-
            Structured, globaly unique room code

            Included to enable multi-room calendars.
            Format: BUILDING.LEVEL.NUMBER
          examples:
            - 5602.EG.001
            - 5121.EG.003
        start_at:
          type: string
          format: date-time
          description: start of the entry
          examples:
            - 2018-01-01T00:00:00
        stp_type:
          type:
            - string
            - "null"
          description: Lecture-type
          examples:
            - Vorlesung mit Zentralübung
        title_de:
          type: string
          description: German title of the Entry
          examples:
            - Quantenteleportation
        title_en:
          type: string
          description: English title of the Entry
          examples:
            - Quantum teleportation
    EventSection:
      type: object
      description: A section of campus event results.
      required:
        - entries
        - n_visible
        - estimatedTotalHits
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/EventEntry'
        estimatedTotalHits:
          type: integer
          description: The estimated (not exact) number of hits for that query
          example: 6
          minimum: 0
        n_visible:
          type: integer
          description: |-
            A recommendation how many of the entries should be displayed by default.

            The number is usually from `0`..`5`.
            More results might be displayed when clicking "expand".
          example: 4
          minimum: 0
    EventTypeResponse:
      type: string
      enum:
        - lecture
        - exercise
        - exam
        - barred
        - other
    ExtraComputedPropResponse:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          examples:
            - 'for exams: 102 in tight, 71 in wide, 49 in corona'
        footer:
          type:
            - string
            - "null"
          examples:
            - data based on a Survey of chimneysweeps
        header:
          type:
            - string
            - "null"
          examples:
            - Genauere Angaben
    FacetFilter:
      type: string
      description: |-
        Allowlisted values for the `?type=` query parameter.

        Modeled as an enum so `serde` rejects unknown values with a 400 instead of
        silently dropping them, and so the `OpenAPI` schema advertises the exact set
        of accepted values.
      enum:
        - site
        - building
        - room
        - poi
        - lecture
        - event
    FeaturedOverviewItemResponse:
      type: object
      required:
        - id
        - name
        - subtext
        - image_url
      properties:
        id:
          type: string
          description: The id of the entry
        image_url:
          type: string
          description: The thumbnail for the building
        name:
          type: string
          description: Human display name
        subtext:
          type: string
          description: What should be displayed below this Building
    FeaturedOverviewResponse:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FeaturedOverviewItemResponse'
    FeedbackCategory:
      type: string
      enum:
        - bug
        - feature
        - search
        - navigation
        - entry
        - general
        - other
    FloorResponse:
      type: object
      required:
        - id
        - short_name
        - name
        - tumonline
        - type
      properties:
        id:
          type: integer
          format: int32
          description: |-
            Virtual ID for sorting

            `0` represents the ground floor.
            Numbers above/below represent where they are relative to the ground floor

            **WARNING**:
            This ID is not guaranteed to be stable.
            Not across buildings, nor within a building.
          examples:
            - -1
            - 0
            - 1
            - 2
            - 3
        name:
          type: string
          description: Longer name of the floor
          examples:
            - 1st basement floor
            - Ground floor
            - 1st mezzanine, above ground floor
        short_name:
          type: string
          description: Short name of the floor
          examples:
            - "-1"
            - "0"
            - Z1
        tumonline:
          type: string
          description: How `TUMonline` names the floor
          examples:
            - U1
            - EG
            - Z1
        type:
          $ref: '#/components/schemas/FloorType'
          description: Type of floor
    FloorType:
      type: string
      enum:
        - roof
        - upper
        - semi_upper
        - ground
        - semi_basement
        - basement
    GenericProp:
      type: object
      required:
        - name
        - text
      properties:
        name:
          $ref: '#/components/schemas/TranslatableStr'
        text:
          type: string
    Image:
      type: object
