          example: 8
          minimum: 0
    Seats:
      type: object
      properties:
        sitting:
          type:
            - integer
            - "null"
          format: int32
          minimum: 0
        standing:
          type:
            - integer
            - "null"
          format: int32
          minimum: 0
        wheelchair:
          type:
            - integer
            - "null"
          format: int32
          minimum: 0
    SectionsResponse:
      type: object
      properties:
        buildings_overview:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/BuildingsOverviewResponse'
        featured_overview:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/FeaturedOverviewResponse'
        rooms_overview:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/RoomsOverviewResponse'
    SourceResponse:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the provider
          example: NavigaTUM
        url:
          type:
            - string
            - "null"
          description: Url of the provider
          example: https://nav.tum.de
    SourcesResponse:
      type: object
      description: Where we got our data from, should be displayed at the bottom of any page containing this data
      required:
        - base
      properties:
        base:
          type: array
          items:
            $ref: '#/components/schemas/SourceResponse'
          description: What is the basis of the data we have
        patched:
          type:
            - boolean
            - "null"
          description: |-
            Was this entry patched by us? (e.g. to fix a typo in the name/...)
            If so, we should not display the source, as it is not the original source.
    StepInstructionResponse:
      type: object
      required:
        - area
        - distance
        - exit
        - from_level
        - polyline
        - relative_direction
        - stay_on
        - street_name
        - to_level
      properties:
        access_restriction:
          type:
            - string
            - "null"
          description: |-
            Experimental. Indicates whether access to this part of the route is
            restricted.
            See: <https://wiki.openstreetmap.org/wiki/Conditional_restrictions>
        area:
          type: boolean
          description: |-
            Not implemented!
            This step is on an open area, such as a plaza or train platform,
            and thus the directions should say something like "cross"
        distance:
          type: number
          format: double
        elevation_down:
          type:
            - integer
            - "null"
          format: int64
          description: decline in meters across this path segment
        elevation_up:
          type:
            - integer
            - "null"
          format: int64
          description: incline in meters across this path segment
        exit:
          type: string
          description: |-
            Not implemented!
            When exiting a highway or traffic circle, the exit name/number.
        from_level:
          type: number
          format: double
        osm_way:
          type:
            - integer
            - "null"
          format: int64
          description: OpenStreetMap way index
        polyline:
          type: string
          description: Polyline geometry (precision 6) of the leg.
        relative_direction:
          $ref: '#/components/schemas/DirectionResponse'
        stay_on:
          type: boolean
          description: |-
            Indicates whether or not a street changes direction at an
             intersection.
        street_name:
          type: string
          description: The name of the street.
        to_level:
          type: number
          format: double
        toll:
          type:
            - boolean
            - "null"
          description: |-
            Indicates that a fee must be paid by general traffic to use a road,
             road bridge or road tunnel.
    SummaryResponse:
      type: object
      required:
        - time_seconds
        - length_meters
        - has_toll
        - has_highway
        - has_ferry
        - min_lat
        - min_lon
        - max_lat
        - max_lon
      properties:
        has_ferry:
          type: boolean
          description: if the path uses one or more ferry segments
        has_highway:
          type: boolean
          description: If the path uses one or more highway segments
        has_toll:
          type: boolean
          description: If the path uses one or more toll segments
        length_meters:
          type: number
          format: double
          description: Distance traveled in meters
          example: 103.01
        max_lat:
          type: number
          format: double
          description: Maximum latitude of the sections bounding box
          example: 48.26244490906312
        max_lon:
          type: number
          format: double
          description: Maximum longitude of the sections bounding box
          example: 48.26244490906312
        min_lat:
          type: number
          format: double
          description: Minimum latitude of the sections bounding box
          example: 48.26244490906312
        min_lon:
          type: number
          format: double
          description: Minimum longitude of the sections bounding box
          example: 48.26244490906312
        time_seconds:
          type: number
          format: double
          description: Estimated elapsed time in seconds
          example: 201.025
    TokenResponse:
      type: object
      required:
        - created_at
        - token
      properties:
        created_at:
          type: integer
          format: int64
          description: Unix timestamp of when the token was created
          example: "1629564181"
        token:
          type: string
          description: The JWT token, that can be used to generate feedback
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJleHAiOjE2Njk2MzczODEsImlhdCI6MTY2OTU5NDE4MSwibmJmIjoxNjY5NTk0MTkxLCJraWQiOjE1ODU0MTUyODk5MzI0MjU0Mzg2fQ.sN0WwXzsGhjOVaqWPe-Fl5x-gwZvh28MMUM-74MoNj4
    TransitInfoResponse:
      type: object
      required:
        - onestop_id
        - short_name
        - long_name
        - headsign
        - color
        - text_color
        - description
        - operator_onestop_id
        - operator_name
        - operator_url
        - transit_stops
      properties:
        color:
          type: integer
          format: int32
          description: |-
            The numeric color value associated with a transit route

            The value for yellow would be `16567306`
          examples:
            - 16567306
        description:
          type: string
          description: The description of the transit route
          examples:
            - |-
              Trains operate from Ditmars Boulevard, Queens, to Stillwell Avenue, Brooklyn, at all times
              N trains in Manhattan operate along Broadway and across the Manhattan Bridge to and from Brooklyn.
              Trains in Brooklyn operate along 4th Avenue, then through Borough Park to Gravesend.
              Trains typically operate local in Queens, and either express or local in Manhattan and Brooklyn,
              depending on the time. Late night trains operate via Whitehall Street, Manhattan.
              Late night service is local
        headsign:
          type: string
          description: The sign on a public transport vehicle that identifies the route destination to passengers
          examples:
            - ASTORIA - DITMARS BLVD
        long_name:
          type: string
          description: Long name describing the transit route
          examples:
            - Broadway Express
        onestop_id:
          type: string
          description: |-
            Global transit route identifier

            **Tipp:** you use these as feed-ids in transitland.
            Example: <https://www.transit.land/feeds/f-9q9-bart>
          examples:
            - f-9q9-bart
            - f-zeus~schwäbisch~gmünd~gbfs
        operator_name:
          type: string
          description: |-
            Operator/agency name

            Short name is used over long name
          examples:
            - BART
            - King County Marine Division
            - Münchner Verkehrs- und Tarifverbund (MVV)
        operator_onestop_id:
          type: string
          description: |-
            Global operator/agency identifier

            **Tipp:** you use these as feed-ids in transitland.
            Example: <https://www.transit.land/feeds/o-u281z9-mvv>
          examples:
            - o-u281z9-mvv
        operator_url:
          type: string
          description: Operator/agency URL
          examples:
            - http://web.mta.info/
            - http://www.mvv-muenchen.de/
        short_name:
          type: string
          description: Short name describing the transit route
          examples:
            - N
        text_color:
          type: string
          description: |-
            The numeric text color value associated with a transit route

            The value for black would be `0`
          examples:
            - 0
        transit_stops:
          type: array
          items:
            $ref: '#/components/schemas/TransitStopResponse'
          description: A list of the stops/stations associated with a specific transit route
    TransitStopResponse:
      type: object
      required:
        - type
        - name
        - arrival_date_time
        - departure_date_time
        - is_parent_stop
        - assumed_schedule
        - lat
        - lon
      properties:
        arrival_date_time:
          type: string
          format: date-time
          description: Arrival date and time
        assumed_schedule:
          type: boolean
          description: '`true` if the times are based on an assumed schedule because the actual schedule is not known'
        departure_date_time:
          type: string
          format: date-time
          description: Departure date and time
        is_parent_stop:
          type: boolean
          description: '`true` if this stop is a marked as a parent stop'
        lat:
          type: number
          format: double
          description: Latitude of the transit stop in degrees
          example: 48.26244490906312
        lon:
          type: number
          format: double
          description: Longitude of the transit stop in degrees
          example: 48.26244490906312
        name:
          type: string
          description: Name of the stop or station
          examples:
            - 14 St - Union Sq
        type:
          $ref: '#/components/schemas/TransitStopTypeResponse'
    TransitStopTypeResponse:
      type: string
      enum:
        - stop
        - station
    TranslatableStr:
      type: object
      required:
        - de
        - en
      properties:
        de:
          type: string
        en:
          type: string
    TransportationResponse:
      type: object
      required:
        - id
        - name
        - modes
        - lat
        - lon
        - distance_meters
      properties:
        distance_meters:
          type: number
          format: double
          exclusiveMaximum: 1000
          exclusiveMinimum: 0
        id:
          type: string
          description: The globally unique and somewhat stable id of the station from motis/transitous
          example: de:09184:2073
        lat:
          type: number
          format: double
          description: Latitude
          example: 48.26244490906312
        lon:
          type: number
          format: double
          description: Longitude
          example: 48.26244490906312
        modes:
          type: array
          items:
            $ref: '#/components/schemas/ModeResponse'
          description: |-
            Transport modes served at this station, as reported by motis.
            Unknown / future motis values are normalised to `other`.
          example:
            - bus
            - subway
        name:
          type: string
          description: How the station was named by the operator
          example: Garching, Boltzmannstraße
    TravelModeResponse:
      type: string
      enum:
        - drive
        - pedestrian
        - bicycle
        - public_transit
    URLRefResponse:
      type: object
      description: A link with a localized link text and url
      required:
        - text
      properties:
        text:
          type: string
        url:
          type:
            - string
            - "null"
    UpcomingEvent:
      type: object
      description: |-
        One upcoming occurrence of a lecture, embedded in the lecture document.

        The list lets a client render the expandable lecture row without a second
        round-trip: `room_name` is the German display name of `room_code` (mirroring
        the monolingual `name` field of the geo documents), and clicking an
        occurrence navigates to `/room/<room_code>`.
      required:
        - start_at
        - end_at
        - room_code
        - room_name
      properties:
        end_at:
          type: string
          format: date-time
          description: When the occurrence ends, as an RFC 3339 timestamp.
          example: "2024-10-15T10:00:00Z"
        room_code:
          type: string
          description: The room the occurrence takes place in; navigating to it uses `/room/<room_code>`.
          example: 5606.EG.011
        room_name:
          type: string
          description: The German display name of `room_code`.
          example: Testhörsaal
        start_at:
          type: string
          format: date-time
          description: When the occurrence starts, as an RFC 3339 timestamp.
          example: "2024-10-15T08:00:00Z"
    ValhallaLegResponse:
      type: object
      required:
        - summary
        - maneuvers
        - shape
      properties:
        maneuvers:
          type: array
          items:
            $ref: '#/components/schemas/ManeuverResponse'
        shape:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
        summary:
          $ref: '#/components/schemas/SummaryResponse'
    ValhallaRoutingResponse:
      type: object
      required:
        - legs
        - summary
      properties:
        legs:
          type: array
          items:
            $ref: '#/components/schemas/ValhallaLegResponse'
          description: |-
            A trip contains one (or more) legs.

            A leg is created when routing stops, which currently only happens at the ends (`from`, `to`).
          maxItems: 1
          minItems: 1
        summary:
          $ref: '#/components/schemas/SummaryResponse'
          description: Trip summary
    VertexTypeResponse:
      type: string
      enum:
        - normal
        - bikeshare
        - transit
tags:
  - name: locations
    description: API to access/search for location information
  - name: calendar
    description: APIs to access calendar-data
  - name: feedback
    description: APIs to give feedback
  - name: maps
    description: API to access for map-data
  - name: mensa
    description: Live canteen menu proxy for the TUM-Dev eat-api feed
externalDocs:
  url: https://github.com/TUM-Dev/navigatum
  description: Visit our GitHub Page for more in-depth documentation
$schema: http://json-schema.org/draft-07/schema
