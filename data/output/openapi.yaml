                      - room
          - allOf:
              - $ref: '#/components/schemas/NewBuilding'
              - type: object
                required:
                  - kind
                properties:
                  kind:
                    type: string
                    enum:
                      - building
          - allOf:
              - $ref: '#/components/schemas/NewPoi'
              - type: object
                required:
                  - kind
                properties:
                  kind:
                    type: string
                    enum:
                      - poi
          - allOf:
              - $ref: '#/components/schemas/NewEvent'
              - type: object
                required:
                  - kind
                properties:
                  kind:
                    type: string
                    enum:
                      - event
      propertyNames:
        type: string
    LimitedHashMap_String_Edit:
      type: object
      additionalProperties:
        type: object
        properties:
          coordinate:
            oneOf:
              - type: "null"
              - $ref: '#/components/schemas/Coordinate'
          image:
            oneOf:
              - type: "null"
              - $ref: '#/components/schemas/Image'
          opening_hours:
            oneOf:
              - type: "null"
              - $ref: '#/components/schemas/OpeningHoursEdit'
          properties:
            type:
              - array
              - "null"
            items:
              $ref: '#/components/schemas/PropertyEdit'
      propertyNames:
        type: string
    LocationDetailsResponse:
      type: object
      required:
        - id
        - type
        - type_common_name
        - name
        - aliases
        - parents
        - parent_names
        - parent_types
        - props
        - ranking_factors
        - sources
        - coords
        - maps
      properties:
        aliases:
          type: array
          items:
            type: string
            examples:
              - - 26503@5406
          description: |-
            A list of alternative ids for this entry.

            Not to be confused with
            - `id` which is the unique identifier or
            - `visual-id` which is an alternative identifier for the entry (only displayed in the URL).
        coords:
          $ref: '#/components/schemas/CoordinateResponse'
          description: Coordinate of the location
        id:
          type: string
          description: The id, that was requested
          examples:
            - 5606.EG.036
        imgs:
          type:
            - array
            - "null"
          items:
            $ref: '#/components/schemas/ImageInfoResponse'
          description: |-
            The information you need to request Images from the `/cdn/{size}/{id}_{counter}.webp` endpoint

            TODO: Sometimes missing, sometimes not.. so weird..
        maps:
          $ref: '#/components/schemas/MapsResponse'
          description: Print or overlay maps for said location
        mensa_menu:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/MensaMenuResponse'
              description: |-
                Weekly canteen menu sourced from the eat-api feed.

                Present for the canteens listed in `data/sources/mensa_canteens.csv`; the snapshot
                covers the current and next ISO week. Omitted for every other entry.
        name:
          type: string
          description: The name of the entry in a human-readable form
          examples:
            - 5606.EG.036 (Büro Fachschaft Mathe Physik Informatik Chemie / MPIC)
        opening_hours:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/OpeningHoursResponse'
              description: |-
                Opening hours of this location, when we have a schedule for it.

                Omitted for entries without a known schedule (most rooms).
        parent_names:
          type: array
          items:
            type: string
            examples:
              - - Standorte
                - Garching Forschungszentrum
                - Fakultät Mathematik & Informatik (FMI oder MI)
                - Finger 06 (BT06)
          description: |-
            The human names of the parents.

            They are ordered as they would appear in a Breadcrumb menu.
            See `parents` for their actual ids.
          minItems: 1
        parent_types:
          type: array
          items:
            $ref: '#/components/schemas/ParentLocationTypeResponse'
          description: |-
            The types of the parents.

            They are ordered as they would appear in a Breadcrumb menu.
            See `parents` for their actual ids.
          minItems: 1
        parents:
          type: array
          items:
            type: string
            examples:
              - - root
                - garching
                - mi
                - "5602"
          description: |-
            The ids of the parents.

            They are ordered as they would appear in a Breadcrumb menu.
            See `parent_names` for their human names.
          minItems: 1
        props:
          $ref: '#/components/schemas/PropsResponse'
          description: Data for the info-card table
        ranking_factors:
          $ref: '#/components/schemas/RankingFactorsResponse'
        redirect_url:
          type: string
          description: |-
            The url, this item should be displayed at.

            Present on both redirects and normal entries, to allow for the common /view/:id path
          examples:
            - /room/5606.EG.036
        sections:
          $ref: '#/components/schemas/SectionsResponse'
          description: |-
            Information for different sections on the page like the
            - buildings overview,
            - rooms overview and
            - featured view
        sources:
          $ref: '#/components/schemas/SourcesResponse'
          description: Where we got our data from, should be displayed at the bottom of any page containing this data
        type:
          $ref: '#/components/schemas/LocationTypeResponse'
          description: The type of the entry
        type_common_name:
          type: string
          description: The type of the entry in a human-readable form
          examples:
            - Büro
    LocationEntry:
      type: object
      description: |-
        A `NavigaTUM` entity search result: a site, building, room, or POI.

        Carries the room-id formatting fields (`parsed_id`/`subtext_bold`) that only
        make sense for locations; lectures use [`LectureEntry`] and Nominatim
        addresses use [`AddressEntry`] instead.
      required:
        - id
        - type
        - name
        - subtext
      properties:
        id:
          type: string
          description: The id of the location
          example: 5510.03.002
        name:
          type: string
          description: The display name of the result. Supports highlighting.
          example: "5510.03.002 (\x19MW\x17 2001, Empore)"
        parsed_id:
          type:
            - string
            - "null"
          description: |-
            This is an optional feature, that is only supported for some rooms.

            It might be displayed instead or before the name, to show that a different room id format has matched, that was probably used.
            See the image below for an example.
            It will be cropped to a maximum length to not take too much space in UIs.
            Supports highlighting.
        subtext:
          type: string
          description: |-
            Subtext to show below the search result.

            Usually contains the context of where this rooms is located in.
            Currently not highlighted.
          example: Maschinenwesen (MW)
        subtext_bold:
          type:
            - string
            - "null"
          description: |-
            Subtext to show below the search (by default in bold and after the non-bold subtext).

            Usually contains the arch-id of the room, which is another common room id format, and supports highlighting.
          example: 3002@5510
        type:
          $ref: '#/components/schemas/LocationEntryType'
          description: The type of the entity, resolving to its canonical `/{type}/{id}` route.
    LocationEntryType:
      type: string
      description: |-
        The type of a `NavigaTUM` entity surfaced as a search result.

        The closed set of location types the data pipeline exports (`valid_types`
        in `data/processors/schema.py`, minus the synthetic, non-searchable
        `root`). Every variant resolves to a canonical `/{type}/{id}` route.
      enum:
        - site
        - campus
        - area
        - joined_building
        - building
        - room
        - virtual_room
        - poi
    LocationEventsResponse:
      type: object
      required:
        - events
        - location
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventResponse'
        location:
          $ref: '#/components/schemas/CalendarLocationResponse'
    LocationSection:
      type: object
      description: A section of `NavigaTUM` entity results (sites, buildings, rooms, POIs).
      required:
        - entries
        - n_visible
        - estimatedTotalHits
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LocationEntry'
        estimatedTotalHits:
          type: integer
          description: The estimated (not exact) number of hits for that query
          example: 6
          minimum: 0
        n_visible:
          type: integer
          description: |-
            A recommendation how many of the entries should be displayed by default.

            The number is usually from `0`..`5`.
            More results might be displayed when clicking "expand".
          example: 4
          minimum: 0
    LocationTypeResponse:
      type: string
      enum:
        - room
        - building
        - joined_building
        - area
        - site
        - campus
        - poi
        - other
    ManeuverResponse:
      type: object
      required:
        - type
        - instruction
        - time_seconds
        - length_meters
        - begin_shape_index
        - end_shape_index
        - travel_mode
      properties:
        arrive_instruction:
          type:
            - string
            - "null"
          description: |-
            Written arrive time instruction

            Typically used with a transit maneuver
          examples:
            - 'Arrive: 8:10 AM at 34 St - Herald Sq'
        begin_shape_index:
          type: integer
          description: Index into the list of shape points for the start of the maneuver
          example: 0
          minimum: 0
        begin_street_names:
          type:
            - array
            - "null"
          items:
            type: string
            examples:
              - - Josef Fischaber Straße
          description: |-
            When present, these are the street names at the beginning (transition point) of the
            nonobvious maneuver (if they are different from the names that are consistent along the
            entire nonobvious maneuver)
        depart_instruction:
          type:
            - string
            - "null"
          description: |-
            Written depart time instruction

            Typically used with a transit maneuver
          examples:
            - 'Depart: 8:04 AM from 8 St - NYU'
        end_shape_index:
          type: integer
          description: Index into the list of shape points for the end of the maneuver
          example: 3
          minimum: 0
        ferry:
          type:
            - boolean
            - "null"
          description: '`true` if a ferry is encountered on this maneuver'
        gate:
          type:
            - boolean
            - "null"
          description: '`true` if a gate is encountered on this maneuver'
        highway:
          type:
            - boolean
            - "null"
          description: '`true` if a highway is encountered on this maneuver'
        instruction:
          type: string
        length_meters:
          type: number
          format: double
          description: Maneuver length in meters
          example: 103.01
        rough:
          type:
            - boolean
            - "null"
          description: |-
            `true` if the maneuver is unpaved or rough pavement, or has any portions that have rough
            pavement
        roundabout_exit_count:
          type:
            - integer
            - "null"
          format: int64
          description: The spoke to exit roundabout after entering
          example: 2
        street_names:
          type:
            - array
            - "null"
          items:
            type: string
            examples:
              - - Münchnerstraße
          description: List of street names that are consistent along the entire nonobvious maneuver
        time_seconds:
          type: number
          format: double
          description: Estimated time along the maneuver in seconds
          example: 201.025
        toll:
          type:
            - boolean
            - "null"
          description: '`true` if a toll booth is encountered on this maneuver'
        transit_info:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/TransitInfoResponse'
              description: Contains the attributes that describe a specific transit route
        travel_mode:
          $ref: '#/components/schemas/TravelModeResponse'
          description: Travel mode
        type:
          $ref: '#/components/schemas/ManeuverTypeResponse'
        verbal_arrive_instruction:
          type:
            - string
            - "null"
          description: |-
            Text suitable for use as a verbal arrive time instruction

            Typically used with a transit maneuver
          examples:
            - Arrive at 8:10 AM at 34 St - Herald Sq
        verbal_depart_instruction:
          type:
            - string
            - "null"
          description: |-
            Text suitable for use as a verbal depart time instruction

            Typically used with a transit maneuver
          examples:
            - Depart at 8:04 AM from 8 St - NYU
        verbal_multi_cue:
          type:
            - boolean
            - "null"
          description: |-
            `true` if `verbal_pre_transition_instruction` has been appended with
            the verbal instruction of the next maneuver
        verbal_post_transition_instruction:
          type:
            - string
            - "null"
          description: Text suitable for use as a verbal message immediately after the maneuver transition
          examples:
            - Continue on U.S. 2 22 for 3.9 miles
        verbal_pre_transition_instruction:
          type:
            - string
            - "null"
          description: Text suitable for use as a verbal message immediately prior to the maneuver transition
          examples:
            - Turn right onto North Prince Street, U.S. 2 22
        verbal_transition_alert_instruction:
          type:
            - string
            - "null"
          description: |-
            Text suitable for use as a verbal alert in a navigation application

            The transition alert instruction will prepare the user for the forthcoming transition
          examples:
            - Turn right onto North Prince Street
    ManeuverTypeResponse:
      type: string
      enum:
        - none
        - start
        - start_right
        - start_left
        - destination
        - destination_right
        - destination_left
        - becomes
        - continue
        - slight_right
        - right
        - sharp_right
        - uturn_right
        - uturn_left
        - sharp_left
        - left
        - slight_left
        - ramp_straight
        - ramp_right
        - ramp_left
        - exit_right
        - exit_left
        - stay_straight
        - stay_right
        - stay_left
        - merge
        - roundabout_enter
        - roundabout_exit
        - ferry_enter
        - ferry_exit
        - transit
        - transit_transfer
        - transit_remain_on
        - transit_connection_start
        - transit_connection_transfer
        - transit_connection_destination
        - post_transit_connection_destination
        - merge_right
        - merge_left
        - elevator_enter
        - steps_enter
        - escalator_enter
        - building_enter
        - building_exit
    MapsResponse:
      type: object
      required:
        - default
      properties:
        default:
          $ref: '#/components/schemas/DefaultMapsResponse'
          description: type of the Map that should be shown by default
        overlays:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/OverlayMapsResponse'
              description: |-
                `None` would mean no overlay maps are displayed by default.
                For rooms, you should add a warning that no floor map is available for this room
        roomfinder:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/RoomfinderMapResponse'
    MensaMenuDayResponse:
      type: object
      description: One day in a [`MensaMenuResponse`].
      required:
        - date
        - dishes
      properties:
        date:
          type: string
          description: '`YYYY-MM-DD` calendar date of the day.'
          examples:
            - "2026-06-10"
        dishes:
          type: array
          items:
            $ref: '#/components/schemas/MensaMenuDishResponse'
          description: Dishes served on this day, in the upstream serving order.
    MensaMenuDishResponse:
      type: object
      description: One dish on one day of a [`MensaMenuResponse`].
      required:
        - name
        - prices
        - labels
      properties:
        dish_type:
          type:
            - string
            - "null"
          description: |-
            Short category label upstream uses to group the dish (`Pasta`, `Suppe`, `Studitopf`, ...).

            Omitted when upstream did not classify the dish.
          examples:
            - Pasta
        labels:
          type: array
          items:
            $ref: '#/components/schemas/MensaMenuLabel'
          description: |-
            Allergen, ingredient, and certification labels for the dish.

            The client maps each code to localized text via its own label dictionary, so labels stay
            in sync without a server round-trip on language change.
        name:
          type: string
          description: Dish title in the upstream language (German).
          examples:
            - Pasta Emiliana mit (Vorder-)Schinken und Erbsen
        prices:
          $ref: '#/components/schemas/MensaMenuPricesResponse'
          description: Prices keyed by role. A role is omitted when upstream priced the dish only for some.
    MensaMenuLabel:
      oneOf:
        - $ref: '#/components/schemas/MensaMenuLabelKind'
        - type: string
      description: |-
        A single allergen, ingredient, or certification label for a dish.

        Always serialized in our `snake_case` convention (e.g. `gluten`, `chicken_eggs`), regardless
        of how upstream cased it. The known set mirrors eat-api's `enums/labels.json`; a code not yet
        in this schema is preserved (lower-cased) as [`MensaMenuLabel::Other`] so the client can still
        show it instead of the whole menu failing to parse.
    MensaMenuLabelKind:
      type: string
      description: The labels eat-api documents in `enums/labels.json`, normalized to `snake_case` in our output.
      enum:
        - gluten
        - wheat
        - rye
        - barley
        - oat
        - spelt
        - hybrids
        - shellfish
        - chicken_eggs
        - fish
        - peanuts
        - soy
        - milk
        - lactose
        - almonds
        - hazelnuts
        - walnuts
        - cashews
        - pecan
        - pistachios
        - macadamia
        - celery
        - mustard
        - sesame
        - sulphurs
        - sulfites
        - lupin
        - molluscs
        - shell_fruits
        - bavaria
        - msc
        - dyestuff
        - preservatives
        - antioxidants
        - flavor_enhancer
        - waxed
        - phosphates
        - sweeteners
        - phenylalanine
        - cocoa_containing_grease
        - gelatin
        - alcohol
        - pork
        - beef
        - veal
        - wild_meat
        - lamb
        - garlic
        - poultry
        - cereal
        - meat
        - vegan
        - vegetarian
    MensaMenuPriceResponse:
      type: object
      description: |-
        One role's price for a dish.

        `price_per_unit` and `unit` are upstream-optional because flat-rate dishes (e.g. a fixed
        `1.00 €` Studitopf) carry only a `base_price`.
      required:
        - base_price
      properties:
        base_price:
          type: number
          format: double
          description: Flat amount in Euros charged before any unit upcharge.
          examples:
            - 1
        price_per_unit:
          type:
            - number
            - "null"
          format: double
          description: Additional amount in Euros charged per `unit` (e.g. per 100g).
          examples:
            - 0.9
        unit:
          type:
            - string
            - "null"
          description: Unit the `price_per_unit` is charged against (e.g. `100g`).
          examples:
            - 100g
    MensaMenuPricesResponse:
      type: object
      description: |-
        Per-role price block for a [`MensaMenuDishResponse`].

        Each field is `None` when upstream did not price the dish for that role.
      properties:
        guests:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/MensaMenuPriceResponse'
        staff:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/MensaMenuPriceResponse'
        students:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/MensaMenuPriceResponse'
    MensaMenuResponse:
      type: object
      description: |-
        Weekly canteen menu sourced from the TUM-Dev eat-api feed.

        `days` is calendar-ordered and covers the current ISO week plus the next, so a Friday
        visitor still sees Monday. Closed days are simply absent rather than represented as
        empty entries; an unknown or fully-closed canteen yields an empty `days` list.
      required:
        - source_url
        - last_update
        - days
      properties:
        days:
          type: array
          items:
            $ref: '#/components/schemas/MensaMenuDayResponse'
          description: Per-day dish lists in calendar order; only days with at least one dish are present.
        last_update:
          type: string
          description: '`YYYY-MM-DD` date the feed snapshot was last confirmed (the upstream `Last-Modified`).'
          examples:
            - "2026-06-05"
        source_url:
          type: string
          description: Where the menu was sourced from; shown as the "source" link on the card.
          examples:
            - https://tum-dev.github.io/eat-api/#!/de/mensa-garching
    ModeResponse:
      type: string
      enum:
        - walk
        - bike
        - rental
        - car
        - car_parking
        - car_dropoff
        - odm
        - flex
        - transit
        - tram
        - subway
        - suburban
        - ferry
        - airplane
        - metro
        - bus
        - coach
        - rail
        - highspeed_rail
        - long_distance
        - night_rail
        - regional_fast_rail
        - regional_rail
        - cable_car
        - funicular
        - areal_lift
        - ride_sharing
        - other
    MotisLegResponse:
      type: object
      required:
        - duration
        - end_time
        - from
        - to
        - leg_geometry
        - mode
        - real_time
        - scheduled
        - route_color
        - route_text_color
        - scheduled_end_time
        - scheduled_start_time
        - start_time
      properties:
        agency_id:
          type:
            - string
            - "null"
          description: Identifies a transit brand which is often synonymous with a transit agency.
        agency_name:
          type:
            - string
            - "null"
          description: Full name of the transit agency
        agency_url:
          type:
            - string
            - "null"
          description: URL of the transit agency
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AlertResponse'
          description: Alerts for this stop.
        cancelled:
          type:
            - boolean
            - "null"
          description: Whether this trip is cancelled
        distance:
          type:
            - number
            - "null"
          format: double
          description: Distance in meters
        duration:
          type: integer
          format: int64
          description: |-
            Leg duration in seconds

            If leg is footpath:
              The footpath duration is derived from the default footpath
              duration using the query parameters `transferTimeFactor` and
              `additionalTransferTime` as follows:
              `leg.duration = defaultDuration * transferTimeFactor +
             additionalTransferTime.`  In case the defaultDuration is
             needed, it can be calculated by  `defaultDuration =
             (leg.duration - additionalTransferTime) / transferTimeFactor`.
              Note that the default values are `transferTimeFactor = 1` and
              `additionalTransferTime = 0` in case they are not explicitly
              provided in the query.
        end_time:
          type: string
          format: date-time
          description: leg arrival time
        from:
          $ref: '#/components/schemas/PlaceResponse'
        headsign:
          type:
            - string
            - "null"
          description: |-
            For transit legs, the headsign of the bus or train being used.
            For non-transit legs, null
        interline_with_previous_leg:
          type:
            - boolean
            - "null"
          description: |-
            For transit legs, if the rider should stay on the vehicle as it
             changes route names.
        intermediate_stops:
          type: array
          items:
            $ref: '#/components/schemas/PlaceResponse'
          description: |-
            For transit legs, intermediate stops between the Place where the leg
             originates and the Place where the leg ends. For non-transit
             legs, null.
        leg_geometry:
          type: string
          description: Polyline geometry (precision 6) of the leg.
        mode:
          $ref: '#/components/schemas/ModeResponse'
        real_time:
          type: boolean
          description: Whether there is real-time data about this leg
        rental:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/RentalResponse'
        route_color:
          type: string
          description: |-
            Route color designation that matches public facing material.

            Implementations should default to white (FFFFFF) when omitted or left empty.
            The color difference between `route_color` and `route_text_color` should provide sufficient contrast when viewed on a black and white screen.
        route_short_name:
          type:
            - string
            - "null"
          description: |-
            Short name of a route.

            Often a short, abstract identifier (e.g., "32", "100X", "Green") that riders use to identify a route
        route_text_color:
          type: string
          description: |-
            Legible color to use for text drawn against a background of `route_color`.

            Implementations should default to black (000000) when omitted or left empty.
            The color difference between `route_color` and `route_text_color` should provide sufficient contrast when viewed on a black and white screen.
        route_type:
          type:
            - integer
            - "null"
          format: int64
          description: |-
            Indicates the type of transportation used on a route.

            According to <https://gtfs.org/reference/static/#routestxt> `route_type` Valid options are:

            -  0: Tram, Streetcar, Light rail. Any light rail or street level system within a metropolitan area.
            -  1: Subway, Metro. Any underground rail system within a metropolitan area.
            -  2: Rail. Used for intercity or long-distance travel.
            -  3: Bus. Used for short- and long-distance bus routes.
            -  4: Ferry. Used for short- and long-distance boat service.
            -  5: Cable tram. Used for street-level rail cars where the cable runs beneath the vehicle (e.g., cable car in San Francisco).
            -  6: Aerial lift, suspended cable car (e.g., gondola lift, aerial tramway). Cable transport where cabins, cars, gondolas or open chairs are suspended by means of one or more cables.
            -  7: Funicular. Any rail system designed for steep inclines.
            - 11: Trolleybus. Electric buses that draw power from overhead wires using poles.
            - 12: Monorail. Railway in which the track consists of a single rail or a beam.
        scheduled:
          type: boolean
          description: |-
            Whether this leg was originally scheduled to run or is an additional
             service.
             Scheduled times will equal realtime times in this case.
        scheduled_end_time:
          type: string
          format: date-time
          description: scheduled leg arrival time
        scheduled_start_time:
          type: string
          format: date-time
          description: scheduled leg departure time
        source:
          type:
            - string
            - "null"
          description: Filename and line number where this trip is from
        start_time:
          type: string
          format: date-time
          description: leg departure time
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepInstructionResponse'
          description: |-
            A series of turn by turn instructions
            used for walking, biking and driving.
        to:
          $ref: '#/components/schemas/PlaceResponse'
        trip_id:
          type:
            - string
            - "null"
          description: Identifies a trip
    MotisRoutingResponse:
      type: object
      required:
        - direct
        - itineraries
        - next_page_cursor
        - previous_page_cursor
      properties:
        direct:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryResponse'
          description: |-
            Direct trips by `WALK`, `BIKE`, `CAR`, etc. without time-dependency.

             The starting time (`arriveBy=false`) / arrival time
             (`arriveBy=true`) is always the queried `time` parameter (set to
             "now" if not set). But all `direct` connections are meant
             to be independent of absolute times.
        itineraries:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryResponse'
          description: list of itineraries
        next_page_cursor:
          type: string
          description: |-
            Use the cursor to get the next page of results.

            Insert the cursor
             into the request and post it to get the next page.
             The next page is a set of itineraries departing AFTER the last
             itinerary in this result.
        previous_page_cursor:
          type: string
          description: |-
            Use the cursor to get the previous page of results. Insert the
             cursor into the request and post it to get the previous page.
             The previous page is a set of itineraries departing BEFORE the first
             itinerary in the result for a depart after search. When using the
             default sort order the previous set of itineraries is inserted
             before the current result.
