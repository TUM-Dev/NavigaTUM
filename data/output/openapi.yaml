        end_time:
          type: string
          format: date-time
          description: journey arrival time
        legs:
          type: array
          items:
            $ref: '#/components/schemas/MotisLegResponse'
          description: Journey legs
        start_time:
          type: string
          format: date-time
          description: journey departure time
        transfer_count:
          type: integer
          format: int64
          description: The number of transfers this trip has.
    LectureEntry:
      type: object
      description: A lecture search result, carrying its bilingual titles and upcoming occurrences.
      required:
        - id
        - name
        - subtext
        - title_de
        - title_en
        - next_occurrence_at
        - upcoming
      properties:
        id:
          type: string
          description: The id of the lecture
          example: lecture_5f2c…
        name:
          type: string
          description: The display name of the result. Supports highlighting.
          example: Einführung in die Informatik 1
        next_occurrence_at:
          type: string
          format: date-time
          description: The next time this lecture takes place, as an RFC 3339 timestamp.
          example: "2024-10-15T08:00:00Z"
        subtext:
          type: string
          description: |-
            Subtext to show below the search result.

            Carries the human `stp_type` label (e.g. "Vorlesung").
          example: Vorlesung
        title_de:
          type: string
          description: The German title of the lecture.
          example: Einführung in die Informatik 1
        title_en:
          type: string
          description: The English title of the lecture.
          example: Introduction to Informatics 1
        upcoming:
          type: array
          items:
            $ref: '#/components/schemas/UpcomingEvent'
          description: |-
            The upcoming occurrences of this lecture, in chronological order.

            The first element's `start_at` matches `next_occurrence_at`. The list is
            capped at whichever covers more events: the next 10 occurrences or those
            within a 14-day window.
    LectureSection:
      type: object
      description: A section of lecture results.
      required:
        - entries
        - n_visible
        - estimatedTotalHits
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LectureEntry'
        estimatedTotalHits:
          type: integer
          description: The estimated (not exact) number of hits for that query
          example: 6
          minimum: 0
        n_visible:
          type: integer
          description: |-
            A recommendation how many of the entries should be displayed by default.

            The number is usually from `0`..`5`.
            More results might be displayed when clicking "expand".
          example: 4
          minimum: 0
    LimitedHashMap_String_Addition:
      type: object
      additionalProperties:
        oneOf:
          - allOf:
              - $ref: '#/components/schemas/NewRoom'
              - type: object
