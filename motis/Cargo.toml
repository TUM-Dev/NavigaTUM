[package]
name = "motis-client"
version = "0.1.0"
authors = ["Frank Elsinga <frank@elsinga.de>"]
edition = "2024"

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
reqwest = { version = "0.10", features = ["stream", "json"] }
tracing = "0.1.41"
tokio = { version = "1", default-features = false, optional = true, features = ["rt", "net"] }
serde_json = "1.0.135"
serde_with = "3.12.0"
url = "2.5.4"
chrono = { version = "0.4.40", features = ["serde"] }

[features]
default = ["blocking"]
blocking = ["dep:tokio"]
